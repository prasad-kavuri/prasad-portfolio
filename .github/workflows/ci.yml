name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-unit:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Vitest coverage
        run: npm run test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx', '**/*.mts', '**/*.mjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          # Exclude .next/cache (managed by actions/cache above, not needed at runtime)
          # and .next/dev (dev-mode output, not needed for next start, can be 800MB+).
          path: |
            .next/
            !.next/cache
            !.next/dev
          retention-days: 1

  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        # upload-artifact stores paths relative to the workspace root (.next/server/...)
        # so extract to . (workspace root) to restore .next/ in the correct location.
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .

      - name: Verify artifact landed correctly
        run: |
          ls -la .next/ || (echo "ERROR: .next/ not found after artifact download" && exit 1)

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Start server, wait for readiness, run tests
        # Start next start in the background within the same shell so the PID
        # is trackable; wait-on blocks until port 3000 is accepting connections.
        run: |
          npx next start &
          SERVER_PID=$!
          npx wait-on http://localhost:3000 --timeout 30000
          echo "Server ready (PID $SERVER_PID)"
          npx playwright test --project=${{ matrix.browser }}
          kill $SERVER_PID 2>/dev/null || true
        env:
          NODE_ENV: production

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
