version: 2

updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      # Group minor/patch updates for dev dependencies to reduce noise
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      # Group Playwright + testing deps together
      testing:
        patterns:
          - "@playwright/*"
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
    ignore:
      # Major version bumps require manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - automated

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    ignore:
      # Major version bumps for actions require manual review —
      # non-existent major versions (e.g. checkout@v6) would break CI.
      - dependency-name: "actions/*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - ci
      - automated
