name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-unit:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Vitest coverage
        run: npm run test:coverage

  e2e:
    name: E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-unit
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            install_browser: chromium
            with_deps: true
          - project: firefox
            install_browser: firefox
            with_deps: true
          - project: webkit
            install_browser: webkit
            with_deps: true
          - project: mobile
            install_browser: webkit
            with_deps: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: |
          set -euo pipefail
          install_cmd="npx playwright install ${{ matrix.install_browser }}"
          if [ "${{ matrix.with_deps }}" = "true" ]; then
            install_cmd="npx playwright install --with-deps ${{ matrix.install_browser }}"
          fi
          for attempt in 1 2; do
            echo "Playwright install attempt ${attempt} for ${{ matrix.project }} using: ${install_cmd}"
            if timeout 8m bash -lc "${install_cmd}"; then
              exit 0
            fi
            if [ "${attempt}" -eq 2 ]; then
              echo "Playwright browser install failed after 2 attempts"
              exit 1
            fi
            echo "Install attempt ${attempt} failed; retrying in 15s..."
            sleep 15
          done

      - name: Run E2E tests
        run: |
          npx next start &
          SERVER_PID=$!
          npx wait-on http://localhost:3000 --timeout 30000
          npx playwright test --project=${{ matrix.project }}
          kill $SERVER_PID 2>/dev/null || true
        env:
          NODE_ENV: production

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 7
